[build]
  publish = "."

[[headers]]
  for = "/index.html"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
